    filename: "image.raw.xz"
    compression: "xz"
    mime_type: "application/xz"
    exports: ["xz"]
    image_config:
      <<: *cloud_base_image_config
      conditions:
        "f42 and below cloud init service names":
          when:
            version_less_than: "43"
          shallow_merge:
