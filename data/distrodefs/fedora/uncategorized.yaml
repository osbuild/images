  "iot-installer":
    <<: *rpm_ostree_imgtype_common
    name_aliases: ["fedora-iot-installer"]
    filename: "installer.iso"
    mime_type: "application/x-iso9660-image"
    boot_iso: true
    image_func: "iot_installer"
    iso_label: "IoT"
    variant: "IoT"
