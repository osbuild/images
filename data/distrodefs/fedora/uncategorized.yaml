        - "customizations.hostname"
        - "customizations.kernel.name"
        - "customizations.locale"
        - "customizations.openscap"
        - "customizations.repositories"
        - "customizations.rpm"
        - "customizations.services"
        - "customizations.kernel.append"

  "generic-container": &generic_container
    name_aliases: ["container"]
    filename: "container.tar"
    mime_type: "application/x-tar"
    image_func: "container"
    bootable: false
    exports: ["container"]
    required_partition_sizes: *default_required_dir_sizes
    platforms:
      - arch: "x86_64"
      - arch: "aarch64"
      - arch: "ppc64le"
      - arch: "s390x"
      - arch: "riscv64"
    image_config: &image_config_container
      no_selinux: true
      exclude_docs: true
      locale: "C.UTF-8"
      timezone: "Etc/UTC"
      oci:
        archive:
          env:
            - "PATH=/usr/local/bin:/usr/bin"
            - "container=oci"
          cmd:
            - "/bin/bash"
          working_dir: "/"
          labels:
            license: "MIT"
            name: "fedora"
            vendor: "Fedora Project"
            org.opencontainers.image.license: "MIT"
            org.opencontainers.image.name: "fedora"
            org.opencontainers.image.url: "https://fedoraproject.org/"
            org.opencontainers.image.vendor: "Fedora Project"
    package_sets:
      os:
        - include:
            - "bash"
            - "coreutils"
            - "yum"
            - "dnf"
            - "fedora-release-container"
            - "glibc-minimal-langpack"
            - "rootfiles"
            - "rpm"
            - "sudo"
            - "tar"
            - "util-linux-core"
            - "vim-minimal"
          exclude:
            - "crypto-policies-scripts"
            - "dbus-broker"
            - "deltarpm"
            - "dosfstools"
            - "e2fsprogs"
            - "elfutils-debuginfod-client"
            - "fuse-libs"
            - "gawk-all-langpacks"
            - "glibc-gconv-extra"
