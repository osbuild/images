            - "gnupg2-smime"
            - "grubby"
            - "kernel-core"
            - "kernel-debug-core"
            - "kernel"
            - "langpacks-en_GB"
            - "langpacks-en"
            - "libss"
            - "libxcrypt-compat"
            - "nano"
            - "openssl-pkcs11"
            - "pinentry"
            - "python3-unbound"
            - "shared-mime-info"
            - "sssd-client"
            - "sudo-python-plugin"
            - "systemd"
            - "trousers"
            - "whois-nls"
            - "xkeyboard-config"
    blueprint:
      supported_options: *supported_options_container

  generic-wsl:
    name_aliases: ["wsl"]
    # note that other distributions in images differ and use a .tar suffix, however .wsl is the
    # correct suffix, see:
    # https://learn.microsoft.com/en-us/windows/wsl/build-custom-distro#what-are-wsl-root-filesystem-tar-files
    filename: "image.wsl"
    compression: "xz"
    mime_type: "application/x-tar"
    image_func: "tar"
    exports: ["xz"]
    required_partition_sizes: *default_required_dir_sizes
    platforms:
      - arch: "x86_64"
    image_config:
      <<: *image_config_container
      conditions:
        "on f42 and below we use cloud-init instead of wsl-setup":
          when:
            version_less_than: "42"
          shallow_merge:
            wsl:
              config:
                boot_systemd: true
            cloud_init:
              - filename: "99_wsl.cfg"
                config:
                  datasource_list:
                    - "WSL"
                    - "None"
                  network:
                    config: "disabled"
        # https://github.com/microsoft/WSL/issues/13207
        "work around WSL not reading /etc/locale.conf":
          when:
            version_greater_or_equal: "43"
          shallow_merge:
            files:
              - path: "/etc/default/locale"
                data: |
                  LANG=C.UTF-8
    package_sets:
      os:
        - include:
            - "bash"
            - "coreutils"
            - "yum"
            - "dnf"
            - "fedora-release-container"
            - "glibc-minimal-langpack"
            - "rootfiles"
            - "rpm"
            - "shadow-utils"  # the oobe needs to be able to call adduser
            - "sudo"
            - "systemd"  # the oobe needs to be able to check services
            - "tar"
            - "util-linux-core"
            - "vim-minimal"
            - "wsl-setup"
          exclude:
            - "crypto-policies-scripts"
            - "deltarpm"
            - "dosfstools"
            - "elfutils-debuginfod-client"
            - "fuse-libs"
            - "gawk-all-langpacks"
            - "glibc-gconv-extra"
            - "glibc-langpack-en"
            - "gnupg2-smime"
            - "grubby"
            - "kernel-core"
            - "kernel-debug-core"
            - "kernel"
            - "langpacks-en_GB"
            - "langpacks-en"
            - "libxcrypt-compat"
            - "nano"
            - "openssl-pkcs11"
            - "pinentry"
            - "python3-unbound"
            - "shared-mime-info"
            - "sssd-client"
            - "sudo-python-plugin"
            - "trousers"
            - "whois-nls"
            - "xkeyboard-config"
