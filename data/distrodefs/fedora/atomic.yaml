    ostree:
      <<: *ostree_atomic
      ref: "{{.Distro.Name}}/{{.Distro.MajorVersion}}/{{.Arch}}/sericea"
    package_sets:
      installer:
        - *network_installer_pkgset
        - include:
            - "fedora-release-sway-atomic"

  "budgie-atomic-installer":
